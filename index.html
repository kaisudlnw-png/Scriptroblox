<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Script Hub</title>

<style>
body{
background:linear-gradient(#2b0066,#4b00a8);
font-family:monospace;
color:white;
padding:20px;
}

.card{
background:#14002e;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.code{
background:black;
padding:10px;
border-radius:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
background:linear-gradient(90deg,#a000ff,#4ea1ff);
}
</style>
</head>

<body>

<h1>🌌 Galaxy Script Hub</h1>

<div class="card">
<h2>🔪 Murder Mystery 2</h2>
<div class="code" id="mm2">
loadstring(game:HttpGet("PUT_SCRIPT_LINK"))()
</div>
<button onclick="copy('mm2')">Copy MM2 Script</button>
</div>

<div class="card">
<h2>🧠 Steal A Brainrot</h2>
<div class="code" id="brain">
loadstring(game:HttpGet("PUT_SCRIPT_LINK"))()
</div>
<button onclick="copy('brain')">Copy Brainrot Script</button>
</div>

<script>
function copy(id){
navigator.clipboard.writeText(
document.getElementById(id).innerText
);
}
</script>

</body>
</html>
