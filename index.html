<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Script Hub Game</title>

<style>
body{
background:linear-gradient(#2b0066,#4b00a8);
font-family:monospace;
color:white;
padding:20px;
}

.card{
background:#14002e;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.code{
background:black;
padding:10px;
border-radius:10px;
margin:10px 0;
word-break:break-all;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
background:linear-gradient(90deg,#a000ff,#4ea1ff);
cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Roblox Script Hub Game</h1>

<div class="card">
<h2>🐶 Adopt Me</h2>
<div class="code" id="adopt">
loadstring(game:HttpGet("https://pastebin.com/raw/peLgDaVC"))()
</div>
<button onclick="copy('adopt')">Copy Adopt Me Script</button>
</div>

<div class="card">
<h2>🧠 Steal A Brainrot</h2>
<div class="code" id="brain">
loadstring(game:HttpGet("PUT_YOUR_BRAINROT_SCRIPT"))()
</div>
<button onclick="copy('brain')">Copy Brainrot Script</button>
</div>

<script>
function copy(id){
navigator.clipboard.writeText(
document.getElementById(id).innerText
);
}
</script>

</body>
</html>
